<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KingdomShift Live Test</title>
<script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>
<style>
html,body{margin:0;height:100%;background:#050505;color:#fff;font-family:sans-serif;}
#bar{padding:14px;text-align:center;background:#0A0A0A;border-bottom:1px solid #00C9C8;}
#bar button{background:linear-gradient(135deg,#00C9C8,#C9A227);color:#000;border:none;border-radius:8px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;}
#status{font-size:12px;color:#7E8C99;margin-top:8px;}
#zego{position:fixed;top:80px;left:0;right:0;bottom:0;}
</style>
</head>
<body>
<div id="bar">
  <button onclick="goLive()">🔴 Test Go Live</button>
  <div id="status">Tap the button, then Allow camera & microphone</div>
</div>
<div id="zego"></div>
<script>
const APP_ID = 1974018811;
// temporary token (room: testroom) — expires ~24h, test only
const TOKEN = '04AAAAAGocCEwADEG2Hqidm4yn5y6O1QCzqcd+ZClb5eXCCTneLveBN5AX2Pf9F7PLd6H80hlxx9F4bFsC1/WCDt0YqzKQbVjir0HZwCdEzUbyWgTK3AfvNeyTrzXGJLFhdDCUbMWdtOLyFrRNuheIB8B+WhO29+1r97hf/zRlPH4I4RAtM9M6Q+kFZWrbQ1NBzOB2XJvW52HDEFN3tYlFvgb2vuWK2pDoQcedNCr53z7kktGyuqal9a9Zi7e+Ss3TGC/iRSnQrWN4P8kB';
const ROOM = 'testroom';
const USER = 'testuser';

function setStatus(m){document.getElementById('status').textContent=m;}

function goLive(){
  if(typeof ZegoUIKitPrebuilt==='undefined'){setStatus('Live engine still loading, wait a moment and tap again');return;}
  setStatus('Connecting...');
  try{
    // use the temporary token directly (token mode)
    const kitToken = ZegoUIKitPrebuilt.generateKitTokenForProduction
      ? buildKit()
      : null;
  }catch(e){}
  buildKit();
}

function buildKit(){
  try{
    // The temporary token from the console IS the kit token for this room/user
    const kit = ZegoUIKitPrebuilt.create(TOKEN);
    kit.joinRoom({
      container: document.getElementById('zego'),
      scenario:{ mode: ZegoUIKitPrebuilt.LiveStreaming, config:{ role: ZegoUIKitPrebuilt.Host } },
      showPreJoinView:false,
      turnOnCameraWhenJoining:true,
      turnOnMicrophoneWhenJoining:true,
      onJoinRoom:()=>setStatus('🔴 You are LIVE! Streaming works ✅'),
      onLeaveRoom:()=>setStatus('Left the room')
    });
  }catch(e){
    setStatus('Error: '+(e.message||e));
    console.error(e);
  }
}
</script>
</body>
</html>
