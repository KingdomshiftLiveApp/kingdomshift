button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:none;color:inherit;}
input,textarea{font-family:'DM Sans',sans-serif;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

@keyframes toast{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

// ═══ HELPERS ═══
function $(id){return document.getElementById(id);}
function hide(id){const e=$(id);if(e)e.style.display='none';}
function show(id,d){const e=$(id);if(e)e.style.display=d||'block';}
function toast(m){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}
function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

// ═══ BOOT ═══
async function boot(){
  try{
    const{data:{session}}=await db.auth.getSession();
    if(session){ST.user=session.user;await loadProfile();showApp();}
    else showAuth('login');
  }catch(e){console.error('boot',e);showAuth('login');}
  hide('loading');
  db.auth.onAuthStateChange(async(ev,session)=>{
    if(ev==='SIGNED_IN'&&session){ST.user=session.user;await loadProfile();showApp();}
    else if(ev==='SIGNED_OUT'){ST.user=null;ST.profile=null;showAuth('login');}
  });
}

async function loadProfile(){
  try{
    const{data}=await db.from('profiles').select('*').eq('id',ST.user.id).maybeSingle();
    if(data){
      ST.profile=data;ST.coins=data.coins||0;ST.isPro=data.is_pro||false;
      if(data.notif_settings&&Object.keys(data.notif_settings).length)ST.notifs={...ST.notifs,...data.notif_settings};
      if(data.privacy_settings&&Object.keys(data.privacy_settings).length)ST.privacy={...ST.privacy,...data.privacy_settings};
      $('sbun').textContent=data.display_name||data.username||'Creator';
      $('sbuav').innerHTML=(data.avatar&&data.avatar.startsWith('http'))?'<img src="'+data.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>':(data.avatar||'👤');
    }else{
      // trigger creates profile server-side; if not present yet, show defaults
      $('sbun').textContent=ST.user.email.split('@')[0];
    }
  }catch(e){console.log('profile',e);$('sbun').textContent='Creator';}
}

// ═══ AUTH ═══
async function doSignUp(){
  if(ST.authBusy)return;
  const em=$('a-email')?.value?.trim(),pw=$('a-pass')?.value,un=$('a-user')?.value?.trim();
  if(!em||!pw||!un){authMsg('err','Please fill in all fields');return;}
  if(pw.length<6){authMsg('err','Password must be at least 6 characters');return;}
  authBusy(true);
  const{error}=await db.auth.signUp({email:em,password:pw,options:{data:{username:un,display_name:un}}});
  authBusy(false);
  if(error)authMsg('err',error.message);
  else authMsg('ok','✅ Check your email to confirm your account, then sign in');
}
async function doSignIn(){
  if(ST.authBusy)return;
  const em=$('a-email')?.value?.trim(),pw=$('a-pass')?.value;
  if(!em||!pw){authMsg('err','Please enter your email and password');return;}
  authBusy(true);
  const{error}=await db.auth.signInWithPassword({email:em,password:pw});
  authBusy(false);
  if(error)authMsg('err',error.message);
}
async function doSignOut(){await db.auth.signOut();toast('Signed out');}
function authMsg(t,m){$('au-err').style.display=t==='err'?'block':'none';$('au-ok').style.display=t==='ok'?'block':'none';$(t==='err'?'au-err':'au-ok').textContent=m;}
function authBusy(v){ST.authBusy=v;const b=$('a-btn');if(b){b.disabled=v;b.textContent=v?'Please wait...':(ST.authMode==='login'?'Sign In →':'Create Free Account →');}}

function showAuth(mode){
  ST.authMode=mode;hide('loading');show('auth');hide('app');
  $('au-s').textContent=mode==='login'?'Sign in to your account':'Create your free account';
  $('au-err').style.display='none';$('au-ok').style.display='none';
  const il=mode==='login';
  $('au-form').innerHTML=
    (!il?'<label class="auth-lbl">Username</label><input class="auth-inp" id="a-user" placeholder="your_kingdom_name"/>':'')+
    '<label class="auth-lbl">Email</label><input class="auth-inp" id="a-email" type="email" placeholder="you@email.com"/>'+
    '<label class="auth-lbl">Password</label><input class="auth-inp" id="a-pass" type="password" placeholder="'+(il?'Your password':'Min. 6 characters')+'" onkeydown="if(event.key===\'Enter\')'+(il?'doSignIn':'doSignUp')+'()"/>'+
    '<button class="auth-btn" id="a-btn" onclick="'+(il?'doSignIn':'doSignUp')+'()">'+(il?'Sign In →':'Create Free Account →')+'</button>'+
    '<div class="auth-sw">'+(il?'New here? <a onclick="showAuth(\'register\')">Join Free</a>':'Have an account? <a onclick="showAuth(\'login\')">Sign In</a>')+'</div>';
}

function showApp(){hide('loading');hide('auth');show('app');buildNav();render();}

// ═══ NAV ═══
function go(tab,sub){
  if(tab==='create'){showUpload();return;}
  clearQTimer();stopGifts();
  ST.tab=tab;ST.sub=sub||null;ST.battleView='home';
  buildNav();render();
  const p=$('page');if(p)p.scrollTop=0;
  drawer(false);
}
function buildNav(){
  const f=NAV.find(n=>n.id===ST.tab);
  $('tbtt').textContent=ST.sub?ST.sub.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()):(f?f.lb:'KingdomShift.Live');
  $('lpw').style.display=ST.tab==='live'?'flex':'none';
  ['sbnav','drwnav'].forEach(id=>{
    const nav=$(id);if(!nav)return;let lc=null,h='';
    NAV.forEach(n=>{
      if(n.cat&&n.cat!==lc){h+='<div class="sb-cat">'+n.cat+'</div>';lc=n.cat;}
      const on=ST.tab===n.id&&!ST.sub;
      h+='<div class="sb-item '+(on?'on':'')+'" onclick="go(\''+n.id+'\')"><span class="sb-ic">'+n.ic+'</span><span class="sb-lb">'+n.lb+'</span>'+(n.id==='admin'?'<span class="sb-tag gold">ADMIN</span>':'')+'</div>';
    });
    nav.innerHTML=h;
  });
  const bn=$('bnrow');if(bn)bn.innerHTML=MNAV.map(n=>n.id==='create'?'<div class="bn-i" onclick="go(\'create\')" style="opacity:1"><div class="bn-add">➕</div></div>':'<div class="bn-i '+(ST.tab===n.id?'on':'')+'" onclick="go(\''+n.id+'\')"><span class="bn-ic">'+n.ic+'</span><span class="bn-l">'+n.lb+'</span></div>').join('');
}
function drawer(force){const bg=$('drwbg'),d=$('drw');const o=force!==undefined?force:!d.classList.contains('on');d.classList.toggle('on',o);bg.classList.toggle('on',o);}

// ═══ ROUTER ═══
function render(){
  const p=$('page');if(!p)return;
  const subs={privacy_policy:rPrivacy,terms_of_service:rTerms,creator_agreement:rCreator,live_streaming_guide:rGuide,notification_settings:rNotifSet,privacy_settings:rPrivSet,delete_account:rDelete,child_safety:rChild};
  if(ST.sub&&subs[ST.sub]){subs[ST.sub](p);return;}
  const pages={feed:rFeed,live:rLive,shop:rShop,wealth:rWealth,safe:rSafe,battles:rBattles,profile:rProfile,settings:rSettings,admin:rAdmin,search:rSearch};
  if(pages[ST.tab])pages[ST.tab](p);
}
</script>

<script>
// ═══ FEED ═══
async function fetchPosts(){
  ST.postsLoaded=true;
  loadStories().then(()=>{const p=$('page');if(ST.tab==='feed'&&p)render();});
  try{
    // load videos WITHOUT a join first (join failures were hiding the feed)
    const{data:vids,error}=await db.from('videos').select('*').order('created_at',{ascending:false}).limit(30);
    if(error){console.error('feed videos',error);ST.posts=[];}
    else{
      const posts=vids||[];
      // fetch the creator profiles separately and attach them
      const ids=[...new Set(posts.map(v=>v.creator_id).filter(Boolean))];
      if(ids.length){
        try{
          const{data:profs}=await db.from('profiles').select('id,username,display_name,avatar,verified').in('id',ids);
          const map={};(profs||[]).forEach(pr=>map[pr.id]=pr);
          posts.forEach(v=>{v.profiles=map[v.creator_id]||null;});
        }catch(e){console.log('profiles attach',e);}
      }
      ST.posts=posts;
    }
  }catch(e){console.error('fetchPosts',e);ST.posts=[];}
  if(ST.user){
    try{
      const{data:likes}=await db.from('video_likes').select('video_id').eq('user_id',ST.user.id);
      if(likes)likes.forEach(l=>ST.liked[l.video_id]=true);
      const{data:fols}=await db.from('follows').select('following_id').eq('follower_id',ST.user.id);
      if(fols)fols.forEach(f=>ST.following[f.following_id]=true);
    }catch(e){}
  }
}

// ═══ VIDEO UPLOAD ═══
function showUpload(){
  if(!ST.user){toast('Please sign in first');return;}
  $('upmodal')?.remove();
  const m=document.createElement('div');m.className='modbg';m.id='upmodal';
  m.innerHTML='<div class="mod"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="mod-h">🎬 Upload Video</div><button class="mod-x" onclick="$(\'upmodal\').remove()">×</button></div>'+
    '<div id="up-pick"><label style="display:block;border:2px dashed var(--border);border-radius:12px;padding:28px 14px;text-align:center;cursor:pointer;background:rgba(0,201,200,.03)"><div style="font-size:38px;margin-bottom:8px">📹</div><div style="font-family:Syne,sans-serif;font-size:13px;font-weight:700;margin-bottom:3px">Tap to choose a video</div><div style="font-size:11px;color:var(--muted)">MP4, MOV · up to ~50MB works best</div><input type="file" accept="video/*" style="display:none" onchange="pickVideo(this)"/></label></div>'+
    '<div id="up-form" style="display:none"><div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:11px;font-size:12px;color:var(--teal)" id="up-fname">video selected</div>'+
    '<label class="lbl">Caption</label><input class="inp" id="up-title" placeholder="Say something about your video..." style="margin-bottom:10px"/>'+
    '<label class="lbl">Category</label><select class="inp" id="up-cat" style="margin-bottom:13px"><option>Faith</option><option>Worship</option><option>WealthShift</option><option>Teaching</option><option>Prophetic</option><option>Youth</option><option>Testimony</option></select>'+
    '<button class="auth-btn" id="up-btn" onclick="doUpload()">⬆️ Post Video</button>'+
    '<div id="up-prog" style="display:none;margin-top:11px"><div style="height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden"><div id="up-bar" style="height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:3px;transition:width .3s"></div></div><div id="up-pct" style="text-align:center;font-size:11px;color:var(--muted);margin-top:6px">Uploading...</div></div></div></div>';
  m.addEventListener('click',e=>{if(e.target===m)m.remove();});
  document.body.appendChild(m);
}
let pickedFile=null;
function pickVideo(input){
  const f=input.files&&input.files[0];
  if(!f)return;
  if(f.size>80*1024*1024){toast('That video is large — please pick one under ~50MB');return;}
  pickedFile=f;
  $('up-pick').style.display='none';
  $('up-form').style.display='block';
  $('up-fname').textContent='📹 '+f.name;
}
async function doUpload(){
  if(!pickedFile){toast('Pick a video first');return;}
  if(!ST.user){toast('Please sign in');return;}
  const btn=$('up-btn');btn.disabled=true;btn.textContent='Uploading...';
  $('up-prog').style.display='block';
  const title=$('up-title')?.value||'New video';
  const cat=$('up-cat')?.value||'Faith';
  const ext=(pickedFile.name.split('.').pop()||'mp4').toLowerCase();
  const path=ST.user.id+'/'+Date.now()+'.'+ext;
  // fake-smooth progress (storage API doesn't stream progress in browser SDK)
  let pct=0;const tick=setInterval(()=>{pct=Math.min(pct+Math.random()*12,90);$('up-bar').style.width=pct+'%';$('up-pct').textContent='Uploading... '+Math.round(pct)+'%';},250);
  try{
    const{error:upErr}=await db.storage.from('videos').upload(path,pickedFile,{cacheControl:'3600',upsert:false});
    if(upErr)throw upErr;
    const{data:pub}=db.storage.from('videos').getPublicUrl(path);
    const videoUrl=pub.publicUrl;
    const{error:dbErr}=await db.from('videos').insert({creator_id:ST.user.id,title:title,description:title,video_url:videoUrl,category:cat,status:'published'});
    if(dbErr)throw dbErr;
    clearInterval(tick);$('up-bar').style.width='100%';$('up-pct').textContent='Done! 🎉';
    setTimeout(()=>{$('upmodal')?.remove();pickedFile=null;ST.posts=[];ST.postsLoaded=false;toast('✅ Video posted!');go('feed');},700);
  }catch(e){
    clearInterval(tick);console.error('upload',e);
    $('up-prog').style.display='none';btn.disabled=false;btn.textContent='⬆️ Post Video';
    toast('Upload failed: '+(e.message||'try a smaller video'));
  }
}
function rFeed(p){
  if(!ST.postsLoaded){fetchPosts().then(render);}
  const posts=ST.posts;
  const showingDemo=false;
  p.innerHTML='<div class="stories">'+
    '<div class="story" onclick="storyTap(\'You\')"><div class="st-ring"><div class="st-in">➕</div></div><span class="st-nm">Your Story</span></div>'+
    storyAvatars()+
    '</div>'+
    (showingDemo?'<div style="padding:9px 12px;background:rgba(201,162,39,.06);border-bottom:1px solid var(--border);font-size:11px;color:var(--gold);text-align:center">✨ Sample posts — upload your video and it appears here</div>':'')+
    posts.map((o,i)=>{
      const real=!!o.video_url; // real uploaded post vs demo
      const creatorId=o.profiles?o.profiles.id:null;
      const nm=o.profiles?o.profiles.display_name:o.u||'Creator';
      const hd=o.profiles?'@'+o.profiles.username:o.h||'';
      const av=o.profiles?o.profiles.avatar:o.av||'👤';
      const vf=o.verified||(o.profiles&&o.profiles.verified)||o.v;
      const tx=o.description||o.txt||'';
      const lk=o.lk||o.likes||0,cm=o.cm||o.comments||0,sh=o.sh||o.shares||0;
      const ct=o.category||o.cat||'Faith',isL=o.type==='live';
      const vurl=o.video_url||'';
      const mine=real&&ST.user&&creatorId===ST.user.id;
      const media=vurl
        ? '<div class="po-md" style="padding:0"><video src="'+vurl+'" controls playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;background:#000"></video><div class="po-ct" style="pointer-events:none">'+ct+'</div></div>'
        : '<div class="po-md" onclick="toast(\'▶ Demo clip\')"><div class="po-play">▶</div>'+(isL?'<div class="po-lb"><div class="ld"></div>LIVE</div>':'')+'<div class="po-ct">'+ct+'</div>'+(o.dur?'<div class="po-dr">'+o.dur+'</div>':'')+'</div>';
      const followBtn = mine
        ? '<button class="po-fol" style="border-color:rgba(255,59,85,.3);color:var(--red)" onclick="deleteVideo(\''+o.id+'\')">Delete</button>'
        : (real&&creatorId
            ? '<button class="po-fol '+(ST.following[creatorId]?'on':'')+'" onclick="toggleFollow(\''+creatorId+'\',\''+esc(nm)+'\')">'+(ST.following[creatorId]?'Following':'Follow')+'</button>'
            : '<button class="po-fol" onclick="toast(\'Demo creator\')">Follow</button>');

let pickedStory=null,pickedStoryType='image';
function pickStory(input){
  const f=input.files&&input.files[0];
  if(!f)return;
  if(f.size>50*1024*1024){toast('That file is too big — please pick one under 50MB');return;}
  pickedStory=f;
  pickedStoryType=f.type.startsWith('video')?'video':'image';
  const url=URL.createObjectURL(f);
  $('st-pick').style.display='none';
  $('st-form').style.display='block';
  $('st-preview').innerHTML=pickedStoryType==='video'
    ?'<video src="'+url+'" controls playsinline style="width:100%;max-height:260px"></video>'
    :'<img src="'+url+'" style="width:100%;max-height:260px;object-fit:contain"/>';
  // show file size + a heads-up for big videos
  const mb=(f.size/1024/1024).toFixed(1);
  let note='📦 '+mb+' MB';
  if(pickedStoryType==='video'&&f.size>15*1024*1024)note+=' · Large video — upload may take 30s+';
  $('st-size').textContent=note;
}
async function postStory(){
  if(!pickedStory||!ST.user)return;
  const btn=$('st-btn');btn.disabled=true;btn.textContent='Sharing…';
  $('st-prog').style.display='block';
  // smooth progress indicator (storage SDK doesn't stream real % in browser)
  let pct=0;const big=pickedStory.size>15*1024*1024;
  const tick=setInterval(()=>{pct=Math.min(pct+(big?3:9)+Math.random()*5,92);const bar=$('st-bar'),p=$('st-pct');if(bar)bar.style.width=pct+'%';if(p)p.textContent='Uploading… '+Math.round(pct)+'%';},300);
  try{
    const ext=(pickedStory.name.split('.').pop()||'jpg').toLowerCase();
    const path=ST.user.id+'/story_'+Date.now()+'.'+ext;
    const{error:upErr}=await db.storage.from('stories').upload(path,pickedStory,{cacheControl:'3600',upsert:false});
    if(upErr)throw upErr;
    const{data:pub}=db.storage.from('stories').getPublicUrl(path);
    const{error:dbErr}=await db.from('stories').insert({user_id:ST.user.id,media_url:pub.publicUrl,media_type:pickedStoryType});
    if(dbErr)throw dbErr;
    clearInterval(tick);const bar=$('st-bar'),p=$('st-pct');if(bar)bar.style.width='100%';if(p)p.textContent='Done! 🎉';
    setTimeout(async()=>{pickedStory=null;$('stmodal')?.remove();toast('✨ Story shared!');await loadStories();render();},500);
  }catch(e){
    clearInterval(tick);$('st-prog').style.display='none';btn.disabled=false;btn.textContent='✨ Share to Story';
    toast('Could not share: '+(e.message||'try a smaller file'));
  }
}
function viewStory(userId){
  const g=(ST.storyGroups||[]).find(x=>x.user_id===userId);
  if(!g||!g.items.length)return;
  let idx=0,timer=null,startT=0,dur=5000,raf=null;
  $('stview')?.remove();
  const v=document.createElement('div');v.className='modbg';v.id='stview';v.style.background='rgba(0,0,0,.98)';v.style.alignItems='center';v.style.flexDirection='column';v.style.justifyContent='center';
  function clearTimers(){if(timer){clearTimeout(timer);timer=null;}if(raf){cancelAnimationFrame(raf);raf=null;}}
  function close(){clearTimers();v.remove();}
  function next(){clearTimers();if(idx<g.items.length-1){idx++;show();}else{close();}}
  function prev(){clearTimers();if(idx>0){idx--;show();}else{show();}}
  function animateBar(){
    const fill=document.getElementById('stseg'+idx);
    if(!fill)return;
    const elapsed=Date.now()-startT;
    const pct=Math.min(elapsed/dur*100,100);
    fill.style.width=pct+'%';
    if(pct<100)raf=requestAnimationFrame(animateBar);
  }
  function show(){
    clearTimers();
    const it=g.items[idx];
    const isVid=it.media_type==='video';
    const media=isVid
      ?'<video id="stvid" src="'+it.media_url+'" autoplay playsinline style="max-width:100%;max-height:78vh"></video>'
      :'<img src="'+it.media_url+'" style="max-width:100%;max-height:78vh;object-fit:contain"/>';
    // segment progress bars across the top
    const segs=g.items.map((_,i)=>'<div style="flex:1;height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden"><div id="stseg'+i+'" style="height:100%;width:'+(i<idx?'100':'0')+'%;background:#fff;border-radius:2px"></div></div>').join('');
    v.innerHTML='<div style="width:100%;max-width:480px;padding:10px">'+
      '<div style="display:flex;gap:4px;margin-bottom:9px">'+segs+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:32px;height:32px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--card2)">'+avatarHTML(g.avatar)+'</div><div style="flex:1;font-family:Syne,sans-serif;font-size:13px;font-weight:700;color:#fff">'+g.name+'</div><button class="mod-x" onclick="window._stClose()">×</button></div>'+
      '<div style="position:relative;text-align:center">'+media+
      '<div onclick="window._stPrev()" style="position:absolute;left:0;top:0;bottom:0;width:33%;cursor:pointer"></div>'+
      '<div onclick="window._stNext()" style="position:absolute;right:0;top:0;bottom:0;width:33%;cursor:pointer"></div>'+
      '</div></div>';
    startT=Date.now();
    if(isVid){
      const vid=document.getElementById('stvid');
      if(vid){
        vid.onloadedmetadata=()=>{dur=(vid.duration&&isFinite(vid.duration)?vid.duration*1000:8000);startT=Date.now();animateBar();};
        vid.onended=()=>next();
        dur=8000;animateBar();
      }
    }else{
      dur=5000;animateBar();
      timer=setTimeout(next,dur);
    }
  }
  window._stNext=next;window._stPrev=prev;window._stClose=close;
  v.addEventListener('click',e=>{if(e.target===v)close();});
  document.body.appendChild(v);show();
}

        stream.getTracks().forEach(t=>t.stop());
      }

    }catch(e){
      console.error('camera/mic permission',e);

      try{
        if(!window.ZegoUIKitPrebuilt){ toast('ZEGO engine not loaded'); return; }
        const userName = ST.profile?.display_name || ST.profile?.username || (ST.user?.email ? ST.user.email.split('@')[0] : 'Creator');

          container:box,

          scenario:{mode:ZegoUIKitPrebuilt.LiveStreaming,config:{role:isHost?ZegoUIKitPrebuilt.Host:ZegoUIKitPrebuilt.Audience}},
          showPreJoinView:true,
          turnOnCameraWhenJoining:isHost,

function startBattle(id,name){ST.battleMode={id:id,name:name};ST.quiz={idx:0,score:0,streak:0,answered:false,selected:null,secs:id==='slam'?10:30,qs:[...QUIZ_QS].sort(()=>Math.random()-.5).slice(0,5)};ST.battleView='game';render();startQTimer();}
function rQuiz(p){
  const s=ST.quiz,q=s.qs[s.idx],circ=2*Math.PI*26,total=ST.battleMode.id==='slam'?10:30,off=circ*(s.secs/total);
  const tc=s.secs<=5?'#FF3B55':s.secs<=10?'#FF8C00':'#00C9C8';
  p.innerHTML='<div class="qwrap">'+(s.streak>=3?'<div style="text-align:center;margin-bottom:7px"><span style="display:inline-block;background:rgba(201,162,39,.1);border:1px solid rgba(201,162,39,.2);border-radius:20px;padding:3px 13px;font-family:Syne,sans-serif;font-size:11px;font-weight:700;color:var(--gold2)">🔥 COMBO ×'+s.streak+'!</span></div>':'')+'<div class="q-top"><span class="q-mode">'+ST.battleMode.name+' · Q'+(s.idx+1)+'/'+s.qs.length+'</span><span class="q-score">🏆 '+s.score.toLocaleString()+' pts</span></div><div class="q-prog"><div class="q-pf" style="width:'+(s.idx/s.qs.length*100)+'%"></div></div><div class="qcard"><div class="qc-t"><div style="flex:1"><div class="q-qn">Question '+(s.idx+1)+' · '+q.pts+' pts</div><div class="q-qt">'+q.q+'</div>'+(ST.battleMode.id!=='slam'?'<div class="q-v">📖 '+q.v+'</div>':'')+'</div><div class="tmr"><svg viewBox="0 0 56 56"><circle class="tmr-bg" cx="28" cy="28" r="26"/><circle class="tmr-f" cx="28" cy="28" r="26" stroke="'+tc+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+(circ-off)+'" id="tcirc"/></svg><div class="tmr-c"><span class="tmr-n" id="tnum" style="color:'+tc+'">'+s.secs+'</span><span class="tmr-l">SEC</span></div></div></div><div class="qopts">'+
  q.opts.map((o,i)=>{let c='';if(s.answered){if(i===q.a)c='correct';else if(i===s.selected)c='wrong';}return '<button class="qopt '+c+'" onclick="'+(s.answered?'':'answerQ('+i+')')+'"><span class="qo-l">'+String.fromCharCode(65+i)+'.</span>'+o+(s.answered&&i===q.a?' ✓':'')+(s.answered&&i===s.selected&&i!==q.a?' ✗':'')+'</button>';}).join('')+
  '</div></div><button class="btn bt-glass bt-full" onclick="exitBattle()">← Exit Battle</button></div>';
}
function answerQ(idx){
  clearQTimer();const s=ST.quiz,q=s.qs[s.idx];s.answered=true;s.selected=idx;
  const ok=idx===q.a;
  if(ok){const b=s.secs>20?50:s.secs>10?25:0;s.score+=q.pts+b;s.streak++;toast('✓ Correct! +'+(q.pts+b)+' pts');}
  else{s.streak=0;toast('✗ Wrong answer');}
  render();
  setTimeout(()=>{s.idx++;if(s.idx>=s.qs.length){ST.battleView='result';saveScore();}else{s.answered=false;s.selected=null;s.secs=ST.battleMode.id==='slam'?10:30;}render();if(ST.battleView==='game')startQTimer();},ok?1100:1500);
}
async function saveScore(){if(!ST.user||!ST.quiz)return;try{await db.from('battle_scores').insert({user_id:ST.user.id,mode:ST.battleMode.id,score:ST.quiz.score,questions:ST.quiz.qs.length,streak:ST.quiz.streak});}catch(e){}}
function startQTimer(){
  clearQTimer();
  ST.qTimer=setInterval(()=>{
    if(!ST.quiz||ST.quiz.answered)return;
    ST.quiz.secs--;const tn=$('tnum');if(tn)tn.textContent=ST.quiz.secs;
    const total=ST.battleMode.id==='slam'?10:30,circ=2*Math.PI*26,tc=$('tcirc');
    if(tc){tc.setAttribute('stroke-dashoffset',circ-circ*(ST.quiz.secs/total));const c=ST.quiz.secs<=5?'#FF3B55':ST.quiz.secs<=10?'#FF8C00':'#00C9C8';tc.setAttribute('stroke',c);if(tn)tn.style.color=c;}
    if(ST.quiz.secs<=0){clearQTimer();toast("⏱️ Time's up!");ST.quiz.streak=0;ST.quiz.idx++;if(ST.quiz.idx>=ST.quiz.qs.length){ST.battleView='result';saveScore();render();}else{ST.quiz.answered=false;ST.quiz.selected=null;ST.quiz.secs=ST.battleMode.id==='slam'?10:30;render();startQTimer();}}
  },1000);
}
function clearQTimer(){if(ST.qTimer){clearInterval(ST.qTimer);ST.qTimer=null;}}
function rResult(p){
  const s=ST.quiz;
  p.innerHTML='<div class="qwrap"><div class="qres"><span class="qr-ic">'+(s.score>=400?'🏆':s.score>=200?'🥈':'🥉')+'</span><div class="qr-t">Battle Complete!</div><div class="qr-sc">'+s.score.toLocaleString()+'</div><div style="font-size:12px;color:var(--muted);margin-bottom:14px">Score saved · Keep growing 🙏</div><div style="display:flex;gap:7px"><button class="btn bt-teal" style="flex:1" onclick="exitBattle()">Done ✓</button><button class="btn bt-glass" style="flex:1" onclick="startBattle(\''+ST.battleMode.id+'\',\''+ST.battleMode.name+'\')">Play Again</button></div></div></div>';

let pickedAvatar='👤';
let pickedPhotoFile=null;
function pickAvatar(a){
  pickedAvatar=a;pickedPhotoFile=null;
  $('ep-preview').innerHTML=a;
  document.querySelectorAll('.ep-av').forEach(b=>{
    const on=b.getAttribute('data-av')===a;
    b.style.borderColor=on?'var(--teal)':'var(--border)';
    b.style.background=on?'rgba(0,201,200,.1)':'var(--card)';
  });
}
function pickAvatarPhoto(input){
  const f=input.files&&input.files[0];
  if(!f)return;
  if(f.size>5*1024*1024){toast('Please pick an image under 5MB');return;}
  pickedPhotoFile=f;
  // show preview immediately
  const url=URL.createObjectURL(f);
  $('ep-preview').innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover"/>';
  document.querySelectorAll('.ep-av').forEach(b=>{b.style.borderColor='var(--border)';b.style.background='var(--card)';});
  toast('Photo selected — tap Save');
}
async function saveProfile(){
  const name=$('ep-name')?.value?.trim();
  const bio=$('ep-bio')?.value?.trim();
  if(!name){toast('Please enter a display name');return;}
  const btn=$('ep-btn');btn.disabled=true;btn.textContent='Saving...';
  try{
    let avatarValue=pickedAvatar;
    // if a photo was chosen, upload it first
    if(pickedPhotoFile){
      btn.textContent='Uploading photo...';
      const ext=(pickedPhotoFile.name.split('.').pop()||'jpg').toLowerCase();
      const path=ST.user.id+'/avatar_'+Date.now()+'.'+ext;
      const{error:upErr}=await db.storage.from('avatars').upload(path,pickedPhotoFile,{cacheControl:'3600',upsert:true});
      if(upErr)throw upErr;
      const{data:pub}=db.storage.from('avatars').getPublicUrl(path);
      avatarValue=pub.publicUrl;
    }
    btn.textContent='Saving...';
    const{error}=await db.from('profiles').update({display_name:name,bio:bio,avatar:avatarValue}).eq('id',ST.user.id);
    if(error)throw error;
    if(!ST.profile)ST.profile={};
    ST.profile.display_name=name;ST.profile.bio=bio;ST.profile.avatar=avatarValue;
    // update sidebar (show photo or emoji)
    $('sbun').textContent=name;
    $('sbuav').innerHTML=avatarValue.startsWith('http')?'<img src="'+avatarValue+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>':avatarValue;
    $('epmodal')?.remove();
    toast('✅ Profile updated!');
    render();
  }catch(e){
    btn.disabled=false;btn.textContent='Save Changes';
    toast('Could not save: '+(e.message||'try again'));
  }
}
// helper: render an avatar value as photo or emoji
function avatarHTML(val,size){
  const s=size||34;
  if(val&&val.startsWith('http'))return '<img src="'+val+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>';
  return val||'👤';
}

async function loadSuggested(){
  try{
    const{data}=await db.from('profiles').select('id,username,display_name,avatar,verified').order('followers',{ascending:false}).limit(10);
    const e=$('sres');if(!e)return;
    const others=(data||[]).filter(u=>!ST.user||u.id!==ST.user.id);
    if(!others.length){e.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">No creators yet — invite people to join! 🙏</div>';return;}
    e.innerHTML=others.map(u=>'<div class="row"><div style="font-size:18px">'+(u.avatar||'👤')+'</div><div style="flex:1"><div style="font-family:Syne,sans-serif;font-size:11px;font-weight:700">'+(u.display_name||u.username)+(u.verified?' ✓':'')+'</div><div style="font-size:10px;color:var(--muted)">@'+u.username+'</div></div><button class="btn '+(ST.following[u.id]?'bt-glass':'bt-teal')+' bt-sm" onclick="toggleFollow(\''+u.id+'\',\''+esc(u.display_name||u.username)+'\')">'+(ST.following[u.id]?'Following':'Follow')+'</button></div>').join('');
  }catch(e){const el=$('sres');if(el)el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">Could not load creators</div>';}
}
async function doSearch(q){
  if(!q||q.length<2)return;
  try{const{data}=await db.from('profiles').select('id,username,display_name,avatar,verified').or('username.ilike.%'+q+'%,display_name.ilike.%'+q+'%').limit(10);const e=$('sres');if(e&&data&&data.length)e.innerHTML=data.map(u=>'<div class="row"><div style="font-size:18px">'+(u.avatar||'👤')+'</div><div style="flex:1"><div style="font-family:Syne,sans-serif;font-size:11px;font-weight:700">'+(u.display_name||u.username)+(u.verified?' ✓':'')+'</div><div style="font-size:10px;color:var(--muted)">@'+u.username+'</div></div><button class="btn bt-glass bt-sm" onclick="toast(\'Following '+(u.display_name||u.username)+'\')">Follow</button></div>').join('');}catch(e){}
}
